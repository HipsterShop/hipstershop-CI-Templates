name: template

run-name: "${{ inputs.service_name }} triggered by commit — ${{ github.event.head_commit.message }} (${{ github.sha }})"

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      runtime:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: "20"
      python-version:
        required: false
        type: string
        default: "3.11"
      go-version:
        required: false
        type: string
        default: "1.22"
      java-version:
        required: false
        type: string
        default: "21"
      dotnet-version:
        required: false
        type: string
        default: "8.0"
      java-build-tool:
        required: false
        type: string
        default: "maven"

    secrets:
      SNYK_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false
      SENDGRID_API_KEY:
        required: false


jobs:
  # ── Job 1: Build & Test ───────────────────────────────────────────────────
  build:
    name: "build & test — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - uses: actions/checkout@v4

      - name: Fix file permissions (Gradle)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'gradle'
        run: chmod +x gradle/wrapper/gradle-wrapper.jar gradlew

      - name: Setup Node.js
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: "${{ inputs.service_path }}/package.json"

      - name: Setup Python
        if: inputs.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"

      - name: Setup Go
        if: inputs.runtime == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Setup Java
        if: inputs.runtime == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ inputs.java-version }}
          cache: ${{ inputs.java-build-tool }}

      - name: Setup .NET
        if: inputs.runtime == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Install Node dependencies
        if: inputs.runtime == 'node'
        run: npm install

      - name: Install Python dependencies
        if: inputs.runtime == 'python'
        run: pip install -r requirements.txt

      - name: Download Go modules
        if: inputs.runtime == 'go'
        run: go mod download

      - name: Build (Go)
        if: inputs.runtime == 'go'
        run: go build ./...

      - name: Build (Java — Maven)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'maven'
        run: mvn -B package --no-transfer-progress

      - name: Build (Java — Gradle)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'gradle'
        run: ./gradlew build -x test

      - name: Restore .NET packages
        if: inputs.runtime == 'dotnet'
        run: dotnet restore

      - name: Build (.NET)
        if: inputs.runtime == 'dotnet'
        run: dotnet build --configuration Release --no-restore

      - name: Test (Node)
        if: inputs.runtime == 'node'
        run: npm test -- --passWithNoTests

      - name: Test (Python)
        if: inputs.runtime == 'python'
        run: |
          pip install pytest
          pytest --tb=short || true

      - name: Test (Go)
        if: inputs.runtime == 'go'
        run: go test ./... -v

      - name: Test (Java — Maven)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'maven'
        run: mvn -B test --no-transfer-progress

      - name: Test (Java — Gradle)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'gradle'
        run: ./gradlew test

      - name: Test (.NET)
        if: inputs.runtime == 'dotnet'
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Lint — check unused dependencies (Node)
        if: inputs.runtime == 'node'
        run: npx depcheck || true

      - name: Lint — go vet (Go)
        if: inputs.runtime == 'go'
        run: go vet ./...

      - name: Lint — format check (.NET)
        if: inputs.runtime == 'dotnet'
        run: dotnet format --verify-no-changes || true


  # ── Job 2: Security Scan (Snyk + SonarQube) ──────────────────────────────
  scan:
    name: "scan — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - uses: actions/checkout@v4

      - name: Fix file permissions (Gradle)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'gradle'
        run: chmod +x gradle/wrapper/gradle-wrapper.jar gradlew

      - name: Setup Node.js
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: "${{ inputs.service_path }}/package.json"

      - name: Setup Python
        if: inputs.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"

      - name: Setup Go
        if: inputs.runtime == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Setup Java
        if: inputs.runtime == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ inputs.java-version }}
          cache: ${{ inputs.java-build-tool }}

      - name: Setup .NET
        if: inputs.runtime == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Install Node dependencies
        if: inputs.runtime == 'node'
        run: npm install

      - name: Install Python dependencies
        if: inputs.runtime == 'python'
        run: pip install -r requirements.txt

      - name: Download Go modules
        if: inputs.runtime == 'go'
        run: go mod download

      - name: Restore .NET packages
        if: inputs.runtime == 'dotnet'
        run: dotnet restore

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Install snyk-to-html
        run: npm install -g snyk-to-html

      - name: Snyk scan (Node)
        if: inputs.runtime == 'node'
        run: snyk test --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML (Node)
        if: inputs.runtime == 'node'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Snyk scan (Python)
        if: inputs.runtime == 'python'
        run: snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML (Python)
        if: inputs.runtime == 'python'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Snyk scan (Go)
        if: inputs.runtime == 'go'
        run: snyk test --file=go.mod --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML (Go)
        if: inputs.runtime == 'go'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Snyk scan (Java — Maven)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'maven'
        run: snyk test --file=pom.xml --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk scan (Java — Gradle)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'gradle'
        run: snyk test --file=build.gradle --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML (Java)
        if: inputs.runtime == 'java'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Snyk scan (.NET)
        if: inputs.runtime == 'dotnet'
        run: snyk test --file=$(ls *.csproj | head -1) --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML (.NET)
        if: inputs.runtime == 'dotnet'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Upload Snyk HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}/snyk-report.html
          retention-days: 14

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ${{ inputs.service_path }}
          args: >
            -Dsonar.projectKey=${{ inputs.service_name }}
            -Dsonar.projectName=${{ inputs.service_name }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}


  # ── Job 3: Build & Push Docker Image (with Trivy CRITICAL gate) ──────────
  build-and-push:
    name: "build & push — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker Hub credentials
        id: docker_check
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
          else
            echo "has_credentials=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.docker_check.outputs.has_credentials == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.docker_check.outputs.has_credentials == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image tags
        if: steps.docker_check.outputs.has_credentials == 'true'
        id: meta
        run: |
          echo "image_tag=${{ secrets.DOCKERHUB_USERNAME }}/hipstershop-${{ inputs.service_name }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "image_latest=${{ secrets.DOCKERHUB_USERNAME }}/hipstershop-${{ inputs.service_name }}:latest" >> $GITHUB_OUTPUT

      # Build locally (no push) so Trivy can scan the image before it ships
      - name: Build Docker image (local, pre-scan)
        if: steps.docker_check.outputs.has_credentials == 'true'
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image_tag }} \
            ${{ inputs.service_path }}

      # Fail the job immediately if CRITICAL CVEs are found
      - name: Trivy — scan for CRITICAL vulnerabilities
        if: steps.docker_check.outputs.has_credentials == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image_tag }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      # Only reached if Trivy found no CRITICAL CVEs
      - name: Push Docker image to Docker Hub
        if: steps.docker_check.outputs.has_credentials == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service_path }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image_latest }}
          cache-to: type=inline


  # ── Job 4: Email Notification (fires only when scan or push fails) ────────
  notify:
    name: "notify — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: [scan, build-and-push]
    # Run even if upstream jobs fail, but only when at least one actually failed
    if: always() && (needs.scan.result == 'failure' || needs.build-and-push.result == 'failure')
    steps:
      - name: Check SendGrid credentials
        id: email_check
        run: |
          if [ -n "${{ secrets.SENDGRID_API_KEY }}" ]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
          else
            echo "has_credentials=false" >> $GITHUB_OUTPUT
          fi

      - name: Send failure notification
        if: steps.email_check.outputs.has_credentials == 'true'
        uses: licenseware/send-email-notification@v1
        with:
          api-key: ${{ secrets.SENDGRID_API_KEY }}
          subject: "CI FAILED — ${{ inputs.service_name }} (${{ github.sha }})"
          from-email: chrissattasseril16@gmail.com
          to-email: kondojuvinaykumar2004@gmail.com
          markdown-body: |
            ## CI Pipeline Failed

            **Service:** `${{ inputs.service_name }}`  
            **Commit:** ${{ github.event.head_commit.message }}  
            **SHA:** `${{ github.sha }}`  
            **Actor:** ${{ github.actor }}  
            **Branch:** `${{ github.ref_name }}`

            ## Job Status

            | Job | Result |
            |-----|--------|
            | Security Scan (Snyk + SonarQube) | **${{ needs.scan.result }}** |
            | Docker Build & Push (+ Trivy) | **${{ needs.build-and-push.result }}** |

            > If the Docker job failed due to Trivy, CRITICAL vulnerabilities were detected in the image and the push was blocked.

            [View Full Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
